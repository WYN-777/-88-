<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>International College Teaching Assistant Recruitment System</title>

    <!-- ============ CSS STYLE 开始 ============ -->
    <style>
        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 整体布局 */
        body, html {
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
            background-color: white;
        }

        /* 主容器 */
        .container {
            width: 100vw;
            height: 100vh;
            border: 2px solid #000;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* 头部区域 */
        .top-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .system-icon {
            font-size: 24px;
            margin-right: 10px;
        }

        .system-title {
            font-size: 18px;
            font-weight: bold;
        }

        /* 返回链接 */
        .back-home {
            margin-left: 10px;
            margin-bottom: 10px;
        }

        .back-home a {
            color: #0066cc;
            text-decoration: none;
            font-weight: bold;
        }

        .back-home a:hover {
            text-decoration: underline;
        }

        /* 虚线分隔线 */
        .dotted-line {
            border-top: 1px dotted #000;
            margin: 10px 0 20px 0;
        }

        /* 表单标题 */
        .form-header {
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 20px;
        }

        /* 表格样式 */
        .data-table {
            width: 600px;
            margin: 0 auto;
            border-collapse: collapse;
        }

        .data-table td {
            border: 1px solid #000;
            padding: 8px 12px;
        }

        /* 左侧列 - 字段名 */
        .data-table td:first-child {
            font-weight: bold;
            width: 150px;
            text-align: right;
            background-color: #f9f9f9;
        }

        /* 右侧列 - 值 */
        .data-table td:last-child {
            width: 300px;
            text-align: left;
        }

        /* 按钮容器 */
        .form-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        /* 按钮样式 */
        .form-button {
            padding: 8px 20px;
            background-color: #e6f2ff;
            border: 1px solid #666;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        .form-button:hover {
            background-color: #cce5ff;
        }
    </style>
    <!-- ============ CSS STYLE 结束 ============ -->
</head>
<body>
<div class="container">
    <!-- 系统标题 -->
    <div class="top-header">
        <span class="system-icon">🎓</span>
        <span class="system-title">International College Teaching Assistant Recruitment System</span>
    </div>

    <!-- 返回首页链接 -->
    <div class="back-home">
        <a href="index.html">← Return to Home</a>
    </div>

    <!-- 虚线分隔 -->
    <div class="dotted-line"></div>

    <!-- 表单标题 -->
    <div class="form-header">【Post New Position】</div>

    <!-- 数据表格 -->
    <table class="data-table">
        <tr>
            <td>JOB TITLE</td>
            <td>Java assistant</td>
        </tr>
        <tr>
            <td>MODULES</td>
            <td>Java Programming</td>
        </tr>
        <tr>
            <td>NUMBER</td>
            <td>3</td>
        </tr>
        <tr>
            <td>WORK CIRCLE</td>
            <td>2025-2026-1</td>
        </tr>
        <tr>
            <td>WORKING HOURS</td>
            <td>3h/day</td>
        </tr>
        <tr>
            <td>EMOLUMENT</td>
            <td>60rmb/day</td>
        </tr>
    </table>

    <!-- 操作按钮 -->
    <div class="form-buttons">
        <!-- Preserve 按钮 - 点击后返回到主页 -->
        <button class="form-button" onclick="goToHomePage()">Preserve</button>
        <!-- Submit 按钮 - 点击后提交并跳转 -->
        <button class="form-button" onclick="submitForm()">Submit</button>
    </div>
</div>

<!-- ============ JavaScript 开始 ============ -->
<script>
    // 跳转到主页面的函数
    function goToHomePage() {
        // 这里可以添加保存数据的逻辑
        console.log("保存表单数据...");

        // 跳转到主页
        window.location.href = "index.html";
    }

    // 提交表单的函数
    function submitForm() {
        // 1. 这里可以添加表单验证逻辑
        if (!validateForm()) {
            alert("请填写完整的表单信息！");
            return;
        }

        // 2. 这里可以添加提交数据的逻辑
        console.log("提交表单数据...");

        // 3. 显示成功消息
        alert("职位发布成功！");

        // 4. 跳转回主页面
        window.location.href = "index.html";
    }

    // 表单验证函数（示例）
    function validateForm() {
        // 这里可以添加具体的验证逻辑
        // 比如检查必填字段是否为空

        // 示例验证：检查JOB TITLE是否为空
        const jobTitle = "Java assistant"; // 这里应该是从表单获取的实际值

        if (!jobTitle || jobTitle.trim() === "") {
            alert("职位标题不能为空！");
            return false;
        }

        return true; // 验证通过
    }

    // 可选：添加键盘快捷键支持
    document.addEventListener('keydown', function(event) {
        // 按 Esc 键返回首页
        if (event.key === 'Escape') {
            goToHomePage();
        }

        // 按 Ctrl+Enter 提交
        if (event.ctrlKey && event.key === 'Enter') {
            submitForm();
        }
    });
</script>
<!-- ============ JavaScript 结束 ============ -->
</body>
</html>
