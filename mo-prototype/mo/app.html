<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>International College Teaching Assistant Recruitment System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #fff;
            padding: 20px;
        }
        /* 头部样式 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 20px;
            border-bottom: 2px dashed #ccc;
            margin-bottom: 20px;
        }
        .header h1 {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 24px;
            color: #333;
        }
        .header h1 .icon {
            font-size: 28px;
            color: #6c757d;
        }
        /* 返回按钮样式 - 修改为可点击 */
        .header .back-btn {
            text-decoration: none;
            color: #007bff;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .header .back-btn:hover {
            text-decoration: underline;
            background-color: #f0f8ff;
        }
        /* 标题样式 */
        .section-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        /* 职位卡片样式 */
        .position-card {
            border: 2px solid #333;
            border-radius: 4px;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .position-card h2 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #333;
        }
        .position-info {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            color: #666;
        }
        .position-info .applicant-count {
            color: #28a745; /* 绿色 */
            font-weight: bold;
        }
        .position-info .status {
            color: #6c757d;
            font-weight: bold;
        }
        /* 表单行样式 */
        .form-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-row label {
            font-weight: bold;
            width: 80px;
            color: #333;
        }
        /* 输入框样式 */
        .form-row input[type="text"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            width: 150px;
            transition: border-color 0.3s ease;
        }
        .form-row input[type="text"]:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
        }
        /* 文件上传按钮样式 */
        .file-upload-btn {
            padding: 8px 16px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .file-upload-btn:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
        /* 下拉框样式 */
        .form-row select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            width: 120px;
            transition: border-color 0.3s ease;
        }
        .form-row select:focus {
            outline: none;
            border-color: #007bff;
        }
        /* 操作按钮组 */
        .action-btns {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .offer-btn {
            padding: 8px 16px;
            background-color: #28a745;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .offer-btn:hover {
            background-color: #218838;
            transform: scale(1.05);
        }
        .reject-btn {
            padding: 8px 16px;
            background-color: #dc3545;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .reject-btn:hover {
            background-color: #c82333;
            transform: scale(1.05);
        }
        /* 底部重复行（模拟图2的双层表格） */
        .bottom-row {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        .bottom-row > div {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .bottom-row .name-input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            width: 150px;
        }
        /* 文件链接样式 */
        .file-link {
            color: #007bff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .file-link:hover {
            text-decoration: none;
            background-color: #e9ecef;
            border-color: #007bff;
        }
        .bottom-row .major-select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            width: 120px;
        }
        .bottom-row .action-btns {
            margin-top: 0;
        }

        /* 消息提示样式 */
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.3s ease;
        }
        .message.show {
            opacity: 1;
            transform: translateX(0);
        }
        .message.success {
            background-color: #28a745;
        }
        .message.error {
            background-color: #dc3545;
        }
        .message.info {
            background-color: #007bff;
        }
    </style>
</head>
<body>
<!-- 头部区域 -->
<div class="header">
    <h1>
        <span class="icon">🎓</span>
        International College Teaching Assistant Recruitment System
    </h1>
    <!-- 返回按钮 - 修改为可点击 -->
    <a class="back-btn" onclick="returnToHome()">← Return to Home</a>
</div>

<!-- 页面标题 -->
<div class="section-title">【 My Position 】</div>

<!-- 职位卡片 -->
<div class="position-card">
    <h2>Java Assistant</h2>
    <div class="position-info">
        <span class="applicant-count">Number of Applicant: 1 people</span>
        <span class="status">Status: Recruiting</span>
    </div>

    <!-- 第一行：标签 + 输入控件 -->
    <div class="form-row">
        <label>NAME</label>
        <input type="text" id="name-input" value="Wang Xixi" />

        <label>RESUME</label>
        <button class="file-upload-btn" onclick="document.getElementById('resume-upload').click()">
            📁 Upload File
        </button>
        <input type="file" id="resume-upload" accept=".pdf,.doc,.docx" />

        <label>MAJOR</label>
        <select id="major-select">
            <option>COMPUTER</option>
            <option>MATH</option>
            <option>ENGLISH</option>
        </select>

        <label>RECRUITMENT</label>
        <div class="action-btns">
            <button class="offer-btn" onclick="handleOffer('Wang Xixi')">Offer</button>
            <button class="reject-btn" onclick="handleReject('Wang Xixi')">Reject</button>
        </div>
    </div>

    <!-- 第二行：重复的输入控件（模拟图2的双层结构） -->
    <div class="bottom-row">
        <div>
            <input type="text" class="name-input" value="Wang Xixi" />
        </div>
        <div>
            <a href="#" class="file-link" onclick="viewResume()">📁 Check the file</a>
        </div>
        <div>
            <select class="major-select">
                <option>COMPUTER</option>
                <option>MATH</option>
                <option>ENGLISH</option>
            </select>
        </div>
        <div class="action-btns">
            <button class="offer-btn" onclick="handleOffer('Applicant 2')">Offer</button>
            <button class="reject-btn" onclick="handleReject('Applicant 2')">Reject</button>
        </div>
    </div>
</div>

<!-- 消息提示容器 -->
<div id="message" class="message"></div>

<script>
    // 返回主页函数
    function returnToHome() {
        if (confirm("Return to home page? Any unsaved changes will be lost.")) {
            window.location.href = "index.html"; // 跳转到主页
        }
    }

    // 处理Offer按钮点击
    function handleOffer(applicantName) {
        if (confirm(`Send offer to ${applicantName}?`)) {
            // 这里可以添加发送Offer的逻辑，比如调用API
            console.log(`Sending offer to ${applicantName}...`);

            // 显示成功消息
            showMessage(`Offer sent to ${applicantName} successfully!`, 'success');

            // 更新状态
            updateApplicantStatus(applicantName, 'Offered');

            // 可选：跳转回主页
            // setTimeout(() => {
            //     window.location.href = "index.html";
            // }, 1500);
        }
    }

    // 处理Reject按钮点击
    function handleReject(applicantName) {
        if (confirm(`Reject ${applicantName}'s application?`)) {
            // 这里可以添加拒绝申请的逻辑
            console.log(`Rejecting application from ${applicantName}...`);

            // 显示消息
            showMessage(`Application from ${applicantName} has been rejected.`, 'error');

            // 更新状态
            updateApplicantStatus(applicantName, 'Rejected');
        }
    }

    // 查看简历文件
    function viewResume() {
        // 这里可以添加查看简历的逻辑
        // 比如打开PDF预览窗口或下载文件
        const fileName = "Wang_Xixi_Resume.pdf"; // 示例文件名
        alert(`Opening resume file: ${fileName}\n\nIn a real application, this would open the PDF file.`);

        // 实际应用中可能这样实现：
        // window.open('path/to/resume.pdf', '_blank');

        // 显示消息
        showMessage(`Opening resume file...`, 'info');
    }

    // 文件上传处理
    document.getElementById('resume-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            // 验证文件类型
            const allowedTypes = ['application/pdf', 'application/msword',
                'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
            if (!allowedTypes.includes(file.type)) {
                showMessage('Please upload PDF or Word documents only.', 'error');
                e.target.value = ''; // 清空选择
                return;
            }

            // 验证文件大小（最大5MB）
            if (file.size > 5 * 1024 * 1024) {
                showMessage('File size should be less than 5MB.', 'error');
                e.target.value = '';
                return;
            }

            // 更新按钮文本
            document.querySelector('.file-upload-btn').textContent = `📁 ${file.name}`;

            // 显示成功消息
            showMessage(`File "${file.name}" uploaded successfully!`, 'success');

            // 这里可以添加上传到服务器的逻辑
            // uploadResumeToServer(file);
        }
    });

    // 更新申请人状态
    function updateApplicantStatus(applicantName, status) {
        // 这里可以更新页面上的状态显示
        console.log(`Updating ${applicantName} status to: ${status}`);

        // 实际应用中，这里会更新DOM或发送到服务器
        // 例如：更新申请人列表或计数器

        // 更新申请人计数器
        updateApplicantCount();
    }

    // 更新申请人计数器
    function updateApplicantCount() {
        // 这里可以更新申请人数量的显示
        const countElement = document.querySelector('.applicant-count');
        // 实际应用中应该从服务器获取实时数据
        // 这里只是示例
        console.log("Updating applicant count...");
    }

    // 显示消息函数
    function showMessage(text, type = 'info') {
        const messageDiv = document.getElementById('message');
        messageDiv.textContent = text;
        messageDiv.className = `message ${type} show`;

        // 3秒后自动隐藏
        setTimeout(() => {
            messageDiv.classList.remove('show');
        }, 3000);
    }

    // 键盘快捷键
    document.addEventListener('keydown', function(event) {
        // 按 Esc 键返回首页
        if (event.key === 'Escape') {
            returnToHome();
        }

        // 按 F5 刷新页面
        if (event.key === 'F5') {
            event.preventDefault(); // 阻止默认刷新
            if (confirm("Refresh page? Any unsaved changes will be lost.")) {
                location.reload();
            }
        }
    });

    // 页面加载时初始化
    document.addEventListener('DOMContentLoaded', function() {
        console.log("Approval page loaded");

        // 从本地存储加载数据（如果有）
        loadSavedData();

        // 添加表单输入监听
        document.querySelectorAll('input, select').forEach(element => {
            element.addEventListener('change', function() {
                saveFormData();
            });
        });
    });

    // 保存表单数据到本地存储
    function saveFormData() {
        const formData = {
            name: document.getElementById('name-input').value,
            major: document.getElementById('major-select').value
        };

        localStorage.setItem('approvalFormData', JSON.stringify(formData));
        console.log("Form data saved to localStorage");
    }

    // 从本地存储加载数据
    function loadSavedData() {
        const savedData = localStorage.getItem('approvalFormData');
        if (savedData) {
            try {
                const data = JSON.parse(savedData);
                if (data.name) {
                    document.getElementById('name-input').value = data.name;
                }
                if (data.major) {
                    document.getElementById('major-select').value = data.major;
                }
                console.log("Form data loaded from localStorage");
            } catch (e) {
                console.error("Error loading form data:", e);
            }
        }
    }

    // 添加上传到服务器的函数（示例）
    function uploadResumeToServer(file) {
        // 实际应用中这里会使用FormData和fetch API
        const formData = new FormData();
        formData.append('resume', file);

        // 示例：模拟上传
        showMessage("Uploading file to server...", 'info');

        setTimeout(() => {
            // 模拟上传成功
            showMessage("File uploaded to server successfully!", 'success');
        }, 1500);
    }
</script>
</body>
</html>
