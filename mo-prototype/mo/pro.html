<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>International College Teaching Assistant Recruitment System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            width: 100%;
            background-color: white;
            border: 2px solid #000;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            margin-right: 10px;
            font-size: 24px;
        }

        h1 {
            font-size: 20px;
            font-weight: normal;
            margin: 0;
            color: #333;
        }

        .nav-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .nav-icon {
            width: 40px;
            height: 40px;
            margin-right: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 返回按钮样式 - 修改为可点击 */
        .return-icon {
            background-color: #3498db;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .return-icon:hover {
            background-color: #2980b9;
            transform: scale(1.05);
        }

        /* 个人信息图标样式 */
        .profile-icon {
            background-color: #f1f1f1;
            border: 1px solid #ccc;
            color: #666;
        }

        .nav-text {
            font-size: 16px;
            color: #333;
        }

        /* 返回链接文本样式 */
        .return-text {
            color: #0066cc;
            cursor: pointer;
            font-weight: bold;
        }

        .return-text:hover {
            text-decoration: underline;
        }

        .divider {
            border-top: 2px dotted #999;
            margin: 15px 0;
            width: 100%;
        }

        .form-group {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
        }

        label {
            display: inline-block;
            width: 100px;
            text-align: right;
            margin-right: 10px;
            vertical-align: middle;
        }

        input[type="text"] {
            width: 400px;
            padding: 8px;
            border: 2px solid #333;
            box-sizing: border-box;
            border-radius: 4px;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        .form-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 确认按钮样式 - 修改为可点击 */
        .confirm-btn {
            display: block;
            width: 100px;
            padding: 10px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            text-align: center;
            margin: 20px auto 0;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .confirm-btn:hover {
            background-color: #2980b9;
            transform: scale(1.05);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            input[type="text"] {
                width: 300px;
            }

            h1 {
                font-size: 18px;
            }
        }

        @media (max-width: 576px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .logo {
                margin-bottom: 10px;
            }

            .form-group {
                flex-direction: column;
                align-items: flex-start;
            }

            label {
                text-align: left;
                margin-bottom: 5px;
                width: auto;
            }

            input[type="text"] {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">🎓</div>
        <h1>International College Teaching Assistant Recruitment System</h1>
    </div>

    <!-- 返回首页区域 - 点击整个区域都可以返回 -->
    <div class="nav-item" onclick="returnToHome()" style="cursor: pointer;">
        <div class="nav-icon return-icon">↩️</div>
        <span class="nav-text return-text">Return to Home</span>
    </div>

    <div class="divider"></div>

    <div class="nav-item">
        <div class="nav-icon profile-icon">📋</div>
        <span class="nav-text">My Profile</span>
    </div>

    <div class="form-section">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name">
        </div>

        <div class="form-group">
            <label for="college">College:</label>
            <input type="text" id="college" name="college" placeholder="Enter your college name">
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="text" id="email" name="email" placeholder="Enter your email address">
        </div>

        <div class="form-group">
            <label for="position">Position:</label>
            <input type="text" id="position" name="position" placeholder="Enter your position">
        </div>
    </div>

    <!-- 确认按钮 - 点击后保存并返回 -->
    <div class="confirm-btn" onclick="submitProfile()">Confirm</div>
</div>

<script>
    // 返回主页函数
    function returnToHome() {
        // 这里可以添加提示，询问是否保存
        if (confirm("Return to home page? Any unsaved changes will be lost.")) {
            window.location.href = "index.html";
        }
    }

    // 提交表单函数
    function submitProfile() {
        const name = document.getElementById('name').value;
        const college = document.getElementById('college').value;
        const email = document.getElementById('email').value;
        const position = document.getElementById('position').value;

        // 验证表单
        if (name && college && email && position) {
            // 验证邮箱格式
            if (!isValidEmail(email)) {
                alert("Please enter a valid email address!");
                return;
            }

            // 保存数据到本地存储（在实际应用中应该发送到服务器）
            saveProfileToLocalStorage();

            // 显示成功消息
            alert('Profile updated successfully!');

            // 返回主页
            window.location.href = "index.html";
        } else {
            alert('Please fill in all fields before submitting.');
        }
    }

    // 保存到本地存储（可选功能）
    function saveProfileToLocalStorage() {
        const profileData = {
            name: document.getElementById('name').value,
            college: document.getElementById('college').value,
            email: document.getElementById('email').value,
            position: document.getElementById('position').value,
            lastUpdated: new Date().toISOString()
        };

        // 保存到浏览器本地存储
        localStorage.setItem('userProfile', JSON.stringify(profileData));
        console.log("Profile saved to localStorage:", profileData);
    }

    // 从本地存储加载数据（页面加载时）
    function loadProfileFromLocalStorage() {
        const savedProfile = localStorage.getItem('userProfile');
        if (savedProfile) {
            try {
                const profile = JSON.parse(savedProfile);
                document.getElementById('name').value = profile.name || '';
                document.getElementById('college').value = profile.college || '';
                document.getElementById('email').value = profile.email || '';
                document.getElementById('position').value = profile.position || '';
                console.log("Profile loaded from localStorage");
            } catch (e) {
                console.error("Error loading profile:", e);
            }
        }
    }

    // 邮箱验证函数
    function isValidEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
    }

    // 键盘快捷键
    document.addEventListener('keydown', function(event) {
        // 按 Esc 键返回首页
        if (event.key === 'Escape') {
            returnToHome();
        }

        // 按 Ctrl+Enter 提交表单
        if (event.ctrlKey && event.key === 'Enter') {
            submitProfile();
        }
    });

    // 表单输入监听 - 自动保存草稿
    let saveTimer;
    document.querySelectorAll('input[type="text"]').forEach(input => {
        input.addEventListener('input', function() {
            clearTimeout(saveTimer);
            saveTimer = setTimeout(function() {
                const name = document.getElementById('name').value;
                const college = document.getElementById('college').value;
                const email = document.getElementById('email').value;
                const position = document.getElementById('position').value;

                if (name || college || email || position) {
                    const draftData = { name, college, email, position };
                    localStorage.setItem('profileDraft', JSON.stringify(draftData));
                    console.log("Draft auto-saved");
                }
            }, 1000); // 1秒后自动保存
        });
    });

    // 页面加载时执行
    document.addEventListener('DOMContentLoaded', function() {
        // 加载之前保存的个人信息
        loadProfileFromLocalStorage();

        // 可以设置一些示例数据（用于测试）
        // 如果需要，取消下面的注释
        /*
        if (!localStorage.getItem('userProfile')) {
            document.getElementById('name').value = "Zhang San";
            document.getElementById('college').value = "International College";
            document.getElementById('email').value = "zhangsan@example.com";
            document.getElementById('position').value = "Teaching Assistant";
        }
        */
    });
</script>
</body>
</html>
