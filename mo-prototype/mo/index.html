<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>International College Teaching Assistant Recruitment System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      background-color: white;
    }

    .container {
      width: 100%;
      height: 100vh;
      border: 2px solid #000;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      padding: 30px 0;
      font-size: 24px;
      font-weight: bold;
      border-bottom: 2px dotted #ccc;
      flex-shrink: 0;
    }

    .nav-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 60px;
      padding: 60px 0;
      flex-shrink: 0;
    }

    /* 修改导航项为链接样式 */
    .nav-link {
      text-decoration: none; /* 移除下划线 */
      color: inherit; /* 继承文字颜色 */
      display: block; /* 使链接填满整个区域 */
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 20px 40px;
      border: 2px solid #007BFF;
      border-radius: 50px;
      background-color: white;
      font-weight: bold;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s;
      min-width: 220px;
    }

    .nav-item:hover {
      background-color: #f0f8ff;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .nav-icon {
      font-size: 28px;
    }

    .content-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .message-box {
      text-align: center;
      color: #888;
      font-style: italic;
      font-size: 24px;
      max-width: 600px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <span>🎓 International College Teaching Assistant Recruitment System</span>
  </div>

  <div class="nav-container">
    <!-- Post Recruitment 按钮 - 点击跳转到 post_recruitment.html -->
    <a href="post.html" class="nav-link">
      <div class="nav-item">
        <span class="nav-icon">📄</span>
        Post Recruitment
      </div>
    </a>

    <!-- Approve 按钮 - 点击跳转到 approve.html -->
    <a href="app.html" class="nav-link">
      <div class="nav-item">
        <span class="nav-icon">✅</span>
        Approve
      </div>
    </a>

    <!-- Information 按钮 - 点击跳转到 profile.html -->
    <a href="pro.html" class="nav-link">
      <div class="nav-item">
        <span class="nav-icon">👤</span>
        Information
      </div>
    </a>
  </div>

  <div class="content-area">
    <div class="message-box">
      You have no new messages at the moment.
    </div>
  </div>
</div>
</body>
</html>
