<!DOCTYPE html>
<html>
<head>
    <title>助教系统测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .section { margin-bottom: 30px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>🧪 助教系统功能测试</h1>
    
    <div class="section">
        <h2>1. 测试数据文件</h2>
        <button onclick="testJSONFile()">测试JSON文件读取</button>
        <div id="jsonResult"></div>
    </div>
    
    <div class="section">
        <h2>2. 测试后端API</h2>
        <button onclick="testGetAllTAs()">测试获取所有助教</button>
        <button onclick="testGetAvailableTAs()">测试获取可用助教</button>
        <div id="apiResult"></div>
    </div>
    
    <div class="section">
        <h2>3. 数据显示</h2>
        <div id="taTable"></div>
    </div>

    <script>
    // 1. 测试JSON文件
    async function testJSONFile() {
        const resultDiv = document.getElementById('jsonResult');
        resultDiv.innerHTML = '<p>正在读取JSON文件...</p>';
        
        try {
            const response = await fetch('data/tas.json');
            if (!response.ok) throw new Error('文件未找到');
            
            const data = await response.json();
            resultDiv.innerHTML = `
                <p class="success">✅ JSON文件读取成功！</p>
                <p>📊 共找到 ${data.length} 条助教记录</p>
                <table>
                    <tr><th>ID</th><th>姓名</th><th>学号</th><th>状态</th></tr>
                    ${data.slice(0, 3).map(ta => `
                        <tr>
                            <td>${ta.id}</td>
                            <td>${ta.name}</td>
                            <td>${ta.studentId}</td>
                            <td>${ta.status}</td>
                        </tr>
                    `).join('')}
                </table>
            `;
            
            // 保存数据供后续使用
            window.taData = data;
            displayTATable(data);
            
        } catch (error) {
            resultDiv.innerHTML = `<p class="error">❌ 读取失败: ${error.message}</p>`;
        }
    }
    
    // 2. 测试获取所有助教API
    async function testGetAllTAs() {
        const resultDiv = document.getElementById('apiResult');
        resultDiv.innerHTML = '<p>正在调用后端API...</p>';
        
        try {
            const response = await fetch('/ta-system/admin/dashboard');
            const html = await response.text();
            
            if (response.ok) {
                resultDiv.innerHTML = `
                    <p class="success">✅ 后端API调用成功！</p>
                    <p>状态码: ${response.status}</p>
                    <p>响应长度: ${html.length} 字符</p>
                    <details>
                        <summary>查看响应内容（前500字符）</summary>
                        <pre>${html.substring(0, 500)}...</pre>
                    </details>
                `;
            } else {
                resultDiv.innerHTML = `<p class="error">❌ API返回错误: ${response.status}</p>`;
            }
            
        } catch (error) {
            resultDiv.innerHTML = `<p class="error">❌ 调用失败: ${error.message}</p>`;
        }
    }
    
    // 3. 测试获取可用助教API
    async function testGetAvailableTAs() {
        const resultDiv = document.getElementById('apiResult');
        resultDiv.innerHTML = '<p>正在计算可用助教...</p>';
        
        // 模拟计算可用助教
        if (window.taData) {
            const availableTAs = window.taData.filter(ta => 
                ta.status === 'available' && ta.currentWorkload < 20
            );
            
            resultDiv.innerHTML = `
                <p class="success">✅ 计算完成！</p>
                <p>📈 可用助教: ${availableTAs.length} 人</p>
                <table>
                    <tr><th>姓名</th><th>专业</th><th>GPA</th><th>工作量</th></tr>
                    ${availableTAs.map(ta => `
                        <tr>
                            <td>${ta.name}</td>
                            <td>${ta.major}</td>
                            <td>${ta.gpa}</td>
                            <td>${ta.currentWorkload}</td>
                        </tr>
                    `).join('')}
                </table>
            `;
        } else {
            resultDiv.innerHTML = '<p class="error">❌ 请先测试JSON文件</p>';
        }
    }
    
    // 4. 显示助教表格
    function displayTATable(data) {
        const tableDiv = document.getElementById('taTable');
        
        if (!data || data.length === 0) {
            tableDiv.innerHTML = '<p>没有数据</p>';
            return;
        }
        
        tableDiv.innerHTML = `
            <h3>助教列表 (${data.length} 人)</h3>
            <table>
                <tr>
                    <th>ID</th>
                    <th>姓名</th>
                    <th>学号</th>
                    <th>专业</th>
                    <th>年级</th>
                    <th>GPA</th>
                    <th>技能</th>
                    <th>工作量</th>
                    <th>状态</th>
                </tr>
                ${data.map(ta => `
                    <tr>
                        <td>${ta.id}</td>
                        <td>${ta.name}</td>
                        <td>${ta.studentId}</td>
                        <td>${ta.major}</td>
                        <td>${ta.year}</td>
                        <td>${ta.gpa}</td>
                        <td>${ta.skills.join(', ')}</td>
                        <td>${ta.currentWorkload}</td>
                        <td><span class="status ${ta.status}">${ta.status}</span></td>
                    </tr>
                `).join('')}
            </table>
            
            <style>
                .status { padding: 4px 8px; border-radius: 4px; }
                .status.available { background: #d4edda; color: #155724; }
                .status.busy { background: #f8d7da; color: #721c24; }
            </style>
        `;
    }
    </script>
</body>
</html>
